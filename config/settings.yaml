# =============================================================================
# Configuración central — Asistente RAG de recepción
# =============================================================================
# Ningún parámetro ajustable debe vivir hardcodeado en el código. Si necesitas
# cambiar un modelo, una ruta o el umbral de confianza, se hace aquí.
# =============================================================================

models:
  embedding: "bge-m3"
  generation: "llama3.2:3b"        # alternativa equivalente: "granite3-dense:2b, llama3.1:8b, gemma4:e4b"
  ollama_host: "http://localhost:11434"

paths:
  docs_root: "docs/"
  procedimientos: "docs/procedimientos/"
  directorios: "docs/directorios/"
  inventarios: "docs/inventarios/"
  referencias: "docs/referencias/"
  chroma_db: "data/chroma_db/"
  gap_log: "metrics/gap_log.csv"
  feedback_log: "metrics/feedback_log.csv"

# Chunking diferenciado por tipo de documento (ver docs/decisiones/).
# Procedimientos: texto narrativo largo -> chunks más grandes con solape.
# Directorios/inventarios: entradas cortas tipo lista -> chunks pequeños sin solape.
chunking:
  procedimientos:
    chunk_size: 500
    chunk_overlap: 50
    strategy: "by_section"
  directorios:
    chunk_size: 300               # ~240c (fila real con prefijo de tema) + margen (ADR 0016)
    chunk_overlap: 0
    strategy: "by_entry"
  inventarios:
    chunk_size: 300               # mismo criterio que directorios
    chunk_overlap: 0
    strategy: "by_entry"
  referencias:
    chunk_size: 550               # 450 (fila real ~370c) + margen para el prefijo de tema "[Documento]" (ADR 0016)
    chunk_overlap: 0
    strategy: "by_entry"

retrieval:
  confidence_threshold: 0.5  # bajado de 0.52: preguntas reales con frases coloquiales (no la
                              # redacción exacta del documento) caían en 0.51-0.52 y escalaban
                              # de más. El solape con "sin respuesta" (hasta ~0.60) sigue ahí,
                              # por eso el prompt mantiene una 2a capa de escalado tras esto.
  top_k: 3

generation:
  mode_default: "directo"      # directo | explicado
  temperature: 0.2
  max_tokens: 512

conversation:
  max_history_turns: 2
  allow_clarification: false   # si el modelo puede pedir aclaraciones. Desactivado por defecto:
                               # modelos pequeños tienden a pedir datos que no necesitan y entran en
                               # bucle. Con false, siempre responde con lo que tiene o escala.
  
logging:
  level: "INFO"
  log_file: "metrics/interactions.log"

semantic_cache:
  path: "metrics/answer_cache.json"
  similarity_threshold: 0.85  # más alto que confidence_threshold (0.50): solo sirve
                               # del caché si la pregunta es semánticamente muy similar
